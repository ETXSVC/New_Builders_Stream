services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Document uploads (Task 1.15, design decision #4): a dedicated named
      # volume, not a subdirectory of the ./backend bind mount above, so
      # uploaded files never land inside the git-tracked backend/ source
      # tree. Mounted at app.config.Settings.storage_root's default value
      # (`/data/documents`) — keep the two in sync if either changes.
      - documents_data:/data/documents
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    # Design decision #2 (Phase 2 plan): the Dramatiq worker for async jobs
    # (PDF export, Task 2.15). Same image as `backend` — the worker imports
    # the exact same `app/` package, just runs a different entrypoint
    # against it. Not a request handler, so it does NOT get
    # `current.session` from an enqueuing request; it opens its own
    # `AsyncSession` and calls `set_current_tenant()`/`set_current_user()`
    # explicitly per job.
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No `ports:` — this process is not HTTP-reachable, it only consumes
    # jobs from the Redis-backed queue.
    volumes:
      - ./backend:/app
      # Task 2.15: generate_estimate_pdf writes to the same
      # settings.storage_root path Documents use (Task 1.15) — the SAME
      # named volume as `backend`'s own mount above, not a second, separate
      # one, so a PDF this worker writes is actually visible/persisted for
      # a later request-handling process to read/serve, rather than landing
      # in this container's own ephemeral filesystem.
      - documents_data:/data/documents
    command: dramatiq app.tasks.estimate_pdf

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Docker Compose network hostname, not "localhost" — the frontend container's
      # server-side fetch (app/page.tsx) runs inside its own container, where
      # "localhost" resolves to itself, not the backend container. The backend
      # service is reachable at its Compose service name via Docker's internal DNS.
      NEXT_PUBLIC_API_URL: http://backend:8000

volumes:
  pgdata:
  documents_data:
