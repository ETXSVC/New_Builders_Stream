services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Document uploads (Task 1.15, design decision #4): a dedicated named
      # volume, not a subdirectory of the ./backend bind mount above, so
      # uploaded files never land inside the git-tracked backend/ source
      # tree. Mounted at app.config.Settings.storage_root's default value
      # (`/data/documents`) — keep the two in sync if either changes.
      - documents_data:/data/documents
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    # Design decision #2 (Phase 2 plan): the Dramatiq worker for async jobs
    # (PDF export, Task 2.15). Same image as `backend` — the worker imports
    # the exact same `app/` package, just runs a different entrypoint
    # against it. Not a request handler, so it does NOT get
    # `current.session` from an enqueuing request; it opens its own
    # `AsyncSession` and calls `set_current_tenant()`/`set_current_user()`
    # explicitly per job.
    build: ./backend
    env_file: .env
    environment:
      # Task 3.9 live-verification finding: `MIGRATIONS_DATABASE_URL` in
      # `.env` is deliberately `localhost:5432` (see that file's own
      # comment) because it was, until this task, only ever read by
      # host-side processes (Alembic, pytest). `_check_compliance_expiry`'s
      # owner-role engine (Task 3.8, `app/tasks/compliance_expiry.py`) also
      # reads it, and this container's own `localhost` does not resolve to
      # the `postgres` service — confirmed empirically: without this
      # override, `check_compliance_expiry()` messages reached this worker
      # and were dispatched correctly (proving the Dramatiq wiring above is
      # right), but then failed with `OSError: Connect call failed
      # ('127.0.0.1', 5432)` every time. `environment:` here overrides the
      # `env_file:` value for this service only (Compose's own documented
      # precedence) — same Docker-network-hostname pattern `DATABASE_URL`
      # above already uses for the identical reason, built from the same
      # `${POSTGRES_USER}`/`${POSTGRES_PASSWORD}`/`${POSTGRES_DB}`
      # variables `postgres:`'s own `environment:` block uses, rather than
      # duplicating literal credentials here.
      MIGRATIONS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No `ports:` — this process is not HTTP-reachable, it only consumes
    # jobs from the Redis-backed queue.
    volumes:
      - ./backend:/app
      # Task 2.15: generate_estimate_pdf writes to the same
      # settings.storage_root path Documents use (Task 1.15) — the SAME
      # named volume as `backend`'s own mount above, not a second, separate
      # one, so a PDF this worker writes is actually visible/persisted for
      # a later request-handling process to read/serve, rather than landing
      # in this container's own ephemeral filesystem.
      - documents_data:/data/documents
    # Task 3.9 fix: the Dramatiq CLI only imports the module(s) named on its
    # own command line to discover `@dramatiq.actor`-decorated functions
    # (`dramatiq --help`'s own "Import extra modules" example confirms
    # multiple modules are accepted as additional positional args). Without
    # a module listed here, its actors are never registered with this worker
    # process — a message enqueued for one lands in the dead-letter queue
    # ("Received message for undefined actor"), not an error anyone sees.
    # Task 4.16 found exactly that live: app.tasks.seat_usage (Task 3.23),
    # app.tasks.flag_overdue_financial_records (Task 3.45), and
    # app.tasks.accounting_sync (Task 4.12) had all been added to app/tasks/
    # without being added here, so the scheduler's seat-usage and
    # overdue-flagging messages and every Integrations sync message were
    # being silently DLQ'd in the running stack (confirmed via worker logs).
    # Every module in app/tasks/ that defines an actor must be listed here.
    command: dramatiq app.tasks.estimate_pdf app.tasks.compliance_expiry app.tasks.seat_usage app.tasks.flag_overdue_financial_records app.tasks.accounting_sync app.tasks.send_invitation_email

  scheduler:
    # Task 3.9: fires `check_compliance_expiry.send()` (Task 3.8) once daily
    # via APScheduler's `BlockingScheduler` (`app/scheduler.py`). Same image
    # as `backend`/`worker` — it only needs the `app` package importable,
    # not a different runtime. This process itself never touches the
    # database or Redis's queue contents directly; it only publishes one
    # message a day for `worker` (which DOES import
    # `app.tasks.compliance_expiry`, see that service's `command` above) to
    # pick up and execute.
    build: ./backend
    env_file: .env
    # Kept for defensive startup ordering even though this process itself
    # never queries postgres or redis directly (see the comment block
    # above) — Redis IS the thing `.send()` actually publishes to, and
    # requiring it healthy first avoids this container's very first
    # `add_job(...)` firing before Redis is reachable. Postgres is included
    # for consistency with every other service's own health-gated startup
    # in this file, not because this container queries it.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No `ports:` — same reasoning as `worker`: not HTTP-reachable.
    volumes:
      - ./backend:/app
    command: python -m app.scheduler

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Docker Compose network hostname, not "localhost" — the frontend container's
      # server-side fetch (app/page.tsx) runs inside its own container, where
      # "localhost" resolves to itself, not the backend container. The backend
      # service is reachable at its Compose service name via Docker's internal DNS.
      NEXT_PUBLIC_API_URL: http://backend:8000

volumes:
  pgdata:
  documents_data:
