name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # Phase 2 Task 2.14 introduced the first Redis dependency (Dramatiq
      # async jobs) — this service container was missing from this workflow
      # even though `REDIS_URL` below already pointed at localhost:6379,
      # so every test needing Redis (Task 2.15's PDF-export job tests) was
      # failing in CI with "Connection refused" until this was added.
      # Same image/healthcheck-style as docker-compose.yml's own `redis`
      # service.
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      # Type-checks app/ only (tests are exercised by the suite itself);
      # scope/settings live in pyproject's [tool.mypy].
      - name: Type check (mypy)
        working-directory: backend
        run: mypy

      # Guards the committed OpenAPI snapshot (backend/openapi.json) that
      # frontend/lib/api/types.ts is generated from: a route/schema change
      # that isn't accompanied by a regenerated snapshot fails here instead
      # of drifting silently. Building the schema only imports the app —
      # no DB/Redis connection is made — so dummy env values suffice for
      # the Settings fields that have no defaults.
      - name: OpenAPI schema diff
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost:5432/dummy
          MIGRATIONS_DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost:5432/dummy
          TEST_DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost:5432/dummy
          JWT_SECRET: schema-diff-dummy
          INTEGRATION_TOKEN_ENCRYPTION_KEY: schema-diff-dummy
        run: |
          python scripts/export_openapi.py > /tmp/openapi.json
          if ! diff -u openapi.json /tmp/openapi.json; then
            echo "::error::backend/openapi.json is out of date with the code."
            echo "Regenerate it with:  cd backend && python scripts/export_openapi.py > openapi.json"
            echo "Then regenerate the frontend types:  cd frontend && npm run generate:api-types"
            exit 1
          fi

      - name: Run test suite (includes tenant-isolation and RLS regression gates)
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret
          JWT_EXPIRE_MINUTES: "60"
          REDIS_URL: redis://localhost:6379/0
        run: pytest -v
