[pytest]
asyncio_mode = auto
; Keeps one event loop for the whole test session instead of a fresh one per
; test, matching the lifetime of app.db's module-level async engine singleton.
; conftest.py's _clean_tables fixture already disposes that engine's pool
; after every test, which is what actually fixed the observed Windows
; ProactorEventLoop failure (a pooled asyncpg connection's transport going
; stale across a run_until_complete() boundary) — this setting wasn't proven
; strictly necessary on top of that dispose() call, but is cheap
; defense-in-depth against the same class of stale-event-loop issue if a
; future fixture ever touches the engine without disposing it. Keep it.
asyncio_default_fixture_loop_scope = session
testpaths = tests
